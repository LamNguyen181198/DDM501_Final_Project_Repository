# .github/workflows/ci_cd.yml
# ---------------------------------------------------------------------------
# CI/CD Pipeline — Customer Satisfaction Prediction System
# DDM501 Group 4
#
# Stages:
#   1. lint          — code style (flake8, black)
#   2. test          — unit + integration + data quality + model validation
#   3. build         — Docker image build + push to GHCR
#   4. deploy        — update docker-compose stack on self-hosted runner
# ---------------------------------------------------------------------------

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/satisfaction-api
  PYTHON_VERSION: "3.11"

jobs:

  # -------------------------------------------------------------------------
  # Stage 1 — Lint & Code Style
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run black (format check)
        run: black --check main.py pipeline/ tests/ data_ingestion.py feature_engineering.py

      - name: Run isort (import order)
        run: isort --check-only main.py pipeline/ tests/ data_ingestion.py feature_engineering.py

      - name: Run flake8
        run: flake8 main.py pipeline/ tests/ data_ingestion.py feature_engineering.py --max-line-length=120 --ignore=E203,W503

  # -------------------------------------------------------------------------
  # Stage 2 — Tests
  # -------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=main \
            --cov=pipeline \
            --cov=data_ingestion \
            --cov=feature_engineering \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # -------------------------------------------------------------------------
  # Stage 3 — Build Docker Image
  # -------------------------------------------------------------------------
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runtime

  # -------------------------------------------------------------------------
  # Stage 4 — Deploy (self-hosted runner or SSH)
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        env:
          MODEL_VERSION: ${{ github.sha }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
        run: |
          echo "Checking required model artifacts..."
          required_artifacts=(
            "artifacts/model.joblib"
            "artifacts/preprocessor.joblib"
            "artifacts/label_encoder.joblib"
          )
          for artifact in "${required_artifacts[@]}"; do
            if [ ! -f "$artifact" ]; then
              echo "::error::Missing required artifact: $artifact"
              echo "The API service mounts ./artifacts and requires trained model files."
              echo "Train and persist artifacts before deploy, or change startup to load from a remote registry."
              exit 1
            fi
          done

          echo "Pulling latest images and restarting services..."
          docker compose pull
          docker compose up -d --build
          docker compose ps

      - name: Verify API health post-deploy
        run: |
          for i in {1..12}; do
            if curl --fail --silent --show-error http://localhost:8000/api/v1/health > /dev/null; then
              echo "API health check passed"
              exit 0
            fi
            echo "API not healthy yet (attempt $i/12), waiting 10s..."
            sleep 10
          done

          echo "Health check failed"
          docker compose ps
          docker compose logs api --tail=200
          exit 1

      - name: Notify deployment success
        if: success()
        run: echo "Deployment succeeded for commit ${{ github.sha }}"