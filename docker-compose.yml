# ---------------------------------------------------------------------------
# Customer Satisfaction Prediction System - DDM501 Group 4
# Services (9 total):
#   postgres           - PostgreSQL: Airflow metadata DB
#   mlflow             - MLflow: experiment tracking & model registry
#   airflow-init       - One-time Airflow DB init + admin user creation
#   airflow-webserver  - Airflow UI at http://localhost:8080
#   airflow-scheduler  - Airflow task scheduler
#   api                - FastAPI prediction service at http://localhost:8000
#   evidently          - Evidently drift detection at http://localhost:8001
#   prometheus         - Metrics collection at http://localhost:9090
#   grafana            - Dashboards & alerting at http://localhost:3000
#
# Startup order:
#   1. docker-compose up -d postgres mlflow
#   2. docker-compose up airflow-init        (runs once and exits 0)
#   3. docker-compose up -d                  (start everything else)
#   4. cd pipeline && python train.py        (initial model training)
# ---------------------------------------------------------------------------

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres:5432/airflow"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    MLFLOW_TRACKING_URI: http://mlflow:5000
    PYTHONPATH: /opt/airflow/repo:/opt/airflow/repo/pipeline
    _PIP_ADDITIONAL_REQUIREMENTS: "joblib scikit-learn lightgbm pandas numpy mlflow pyarrow kagglehub"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./artifacts:/opt/airflow/artifacts
    - ./data:/opt/airflow/data
    - .:/opt/airflow/repo
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - mlops_network

networks:
  mlops_network:
    driver: bridge

volumes:
  postgres_data:
  mlflow_data:
  airflow_logs:
  prometheus_data:
  grafana_data:
  evidently_reports:

services:

  # =========================================================================
  # 1. PostgreSQL - Airflow metadata database
  # =========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # 2. MLflow - Experiment Tracking & Model Registry  (http://localhost:5000)
  # =========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: mlflow_server
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=mlflow-artifacts:/
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --artifacts-destination /mlflow/artifacts
        --serve-artifacts
        --allowed-hosts "*"
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # =========================================================================
  # 3. Airflow Init - one-shot DB migration + admin user
  # =========================================================================
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - >-
        airflow db migrate &&
        airflow users create
        --username admin
        --firstname DDM501
        --lastname Group4
        --role Admin
        --email admin@example.com
        --password admin
    restart: "no"

  # =========================================================================
  # 4. Airflow Webserver - http://localhost:8080  (admin / admin)
  # =========================================================================
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  # =========================================================================
  # 5. Airflow Scheduler
  # =========================================================================
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # =========================================================================
  # 6. Prediction API - http://localhost:8000
  # =========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: satisfaction_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ARTIFACTS_DIR=/app/artifacts
      - MODEL_VERSION=${MODEL_VERSION:-1.0.0}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - EVIDENTLY_URL=http://evidently:8001
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "description=Customer satisfaction prediction REST API"

  # =========================================================================
  # 7. Evidently Drift Detection - http://localhost:8001
  # =========================================================================
  evidently:
    build:
      context: ./evidently_service
      dockerfile: Dockerfile
    container_name: evidently_service
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./artifacts:/app/reference_data
      - evidently_reports:/app/reports
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # =========================================================================
  # 8. Prometheus - http://localhost:9090
  # =========================================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # 9. Grafana - http://localhost:3000  (admin / admin123)
  # =========================================================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
