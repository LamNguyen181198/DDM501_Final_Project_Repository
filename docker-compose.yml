version: "3.9"

# ---------------------------------------------------------------------------
# Customer Satisfaction Prediction System — DDM501 Group 4
# Services:
#   api        — FastAPI prediction service
#   mlflow     — Experiment tracking & model registry
#   prometheus — Metrics collection
#   grafana    — Dashboards & alerting
# ---------------------------------------------------------------------------

networks:
  mlops_network:
    driver: bridge

volumes:
  mlflow_data:
  prometheus_data:
  grafana_data:

services:

  # -------------------------------------------------------------------------
  # 1. Prediction API
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: satisfaction_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ARTIFACTS_DIR=/app/artifacts
      - MODEL_VERSION=${MODEL_VERSION:-1.0.0}
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "description=Customer satisfaction prediction REST API"

  # -------------------------------------------------------------------------
  # 2. MLflow — Experiment Tracking & Model Registry
  # -------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: mlflow_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # -------------------------------------------------------------------------
  # 3. Prometheus — Metrics Collection
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------------------------------------------------
  # 4. Grafana — Dashboards & Alerting
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - mlops_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3